name: "블로그 자동화 단독 테스트 (사이트/인스타 안 건드림, 수동 실행 전용)"

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  test-blog:
    runs-on: windows-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_COOKIES_JSON: ${{ secrets.NAVER_COOKIES_JSON }}
      NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: 승인된 카드 이미지 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 네이버 로그인 복원 (쿠키 주입)
        shell: pwsh
        run: python -X utf8 cloud/naver_cookie_login.py

      - name: 블로그 초안 작성
        shell: pwsh
        working-directory: blog
        run: python -X utf8 dotory_blog_draft.py --slot ${{ inputs.slot }}

      - name: 블로그 임시저장 (최신 초안)
        shell: pwsh
        working-directory: blog
        run: |
          $draft = Get-ChildItem drafts\blog_draft_*.json | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          python -X utf8 dotory_blog_publish.py --draft $draft.FullName
