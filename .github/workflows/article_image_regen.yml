name: "기사 그림만 재생성 (기사 내용 유지)"

on:
  repository_dispatch:
    types: [article_image_regen]
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]
      feedback:
        description: "그림에 반영할 피드백 (예: 덜 자극적으로)"
        required: false
        type: string

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  regen-article-image:
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: Stage 1 산출물 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 슬롯/피드백 추출
        id: p
        uses: ./.github/actions/extract-dispatch
        with:
          manual_slot: ${{ inputs.slot }}
          manual_extra: ${{ inputs.feedback }}
          extra_key: feedback

      - name: 그림 재생성 + 기사 승인 메시지 재전송
        shell: pwsh
        # 2026-07-17 보안 수정: 피드백(사람이 자유롭게 쓴 텍스트)은 절대 run: 스크립트
        # 본문에 `${{ }}`로 직접 꽂지 않는다 — env: 매핑을 거쳐 환경변수로만 전달한다
        # (PowerShell 인젝션 방지, 이 잡은 GEMINI_API_KEY 등 시크릿을 env로 갖고 있음).
        env:
          SLOT: ${{ steps.p.outputs.slot }}
          FEEDBACK: ${{ steps.p.outputs.extra }}
        run: |
          python cloud/regen_article_image_and_notify.py --slot $env:SLOT --feedback "$env:FEEDBACK"

      - name: 갱신된 산출물 재저장
        uses: actions/cache/save@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-${{ github.run_id }}
