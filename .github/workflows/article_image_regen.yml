name: "기사 그림만 재생성 (기사 내용 유지)"

on:
  repository_dispatch:
    types: [article_image_regen]
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]
      feedback:
        description: "그림에 반영할 피드백 (예: 덜 자극적으로)"
        required: false
        type: string

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  regen-article-image:
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: Stage 1 산출물 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 슬롯/피드백 추출
        id: p
        shell: pwsh
        # 2026-07-17 보안 수정: 텔레그램 답장으로 받은 feedback(사람이 자유롭게 쓴 텍스트)을
        # `${{ }}`로 run: 스크립트 본문에 직접 꽂으면, 그 텍스트에 "나 백틱이나 $(...)가
        # 섞이는 순간 PowerShell 인젝션이 됨(이 잡은 GEMINI_API_KEY 등 시크릿을 env로 갖고
        # 있음). env: 매핑을 거쳐 환경변수로만 전달 — 이건 YAML 값으로 안전하게 치환되고,
        # 스크립트 소스 텍스트 자체에 섞이지 않아 실행되지 않는다.
        env:
          IN_SLOT: ${{ inputs.slot }}
          IN_FEEDBACK: ${{ inputs.feedback }}
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $slot = $env:IN_SLOT
            $feedback = $env:IN_FEEDBACK
          } else {
            # 2026-07-17: repository_dispatch(텔레그램 버튼/피드백 답장)로 들어올 때는
            # inputs.feedback이 항상 빈 값이라(workflow_dispatch 전용) 실제로 사용자가
            # 답장으로 남긴 피드백이 무시되고 있었음 — client_payload에서 직접 꺼내온다.
            $slot = python cloud/dispatch_payload.py slot
            $feedback = python cloud/dispatch_payload.py feedback
          }
          echo "slot=$slot" >> $env:GITHUB_OUTPUT
          # feedback은 답장 텍스트가 여러 줄일 수 있어서, 단순 "key=value" 한 줄로 쓰면
          # 줄바꿈에서 GITHUB_OUTPUT 파싱이 깨짐(뒤 줄이 유실되거나 엉뚱한 출력 키로 해석됨)
          # — 멀티라인 안전 구분자 문법을 사용한다.
          echo "feedback<<GHOUTPUT_FEEDBACK_EOF" >> $env:GITHUB_OUTPUT
          echo "$feedback" >> $env:GITHUB_OUTPUT
          echo "GHOUTPUT_FEEDBACK_EOF" >> $env:GITHUB_OUTPUT

      - name: 그림 재생성 + 기사 승인 메시지 재전송
        shell: pwsh
        env:
          SLOT: ${{ steps.p.outputs.slot }}
          FEEDBACK: ${{ steps.p.outputs.feedback }}
        run: |
          python cloud/regen_article_image_and_notify.py --slot $env:SLOT --feedback "$env:FEEDBACK"

      - name: 갱신된 산출물 재저장
        uses: actions/cache/save@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-${{ github.run_id }}
