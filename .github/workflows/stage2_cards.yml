name: "Stage 2 - 카드 생성 + 카드 승인 요청"

on:
  repository_dispatch:
    types: [article_approved]
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯 (테스트/수동 실행용)"
        required: true
        type: choice
        options: [morning, lunch, evening, night]

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  build-cards:
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치 (카드 이미지 렌더링용)
        run: playwright install --with-deps chromium

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: 슬롯 결정 (dispatch payload 또는 수동 입력)
        id: slot
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "repository_dispatch") {
            $slot = python cloud/dispatch_payload.py slot
          } else {
            $slot = "${{ inputs.slot }}"
          }
          echo "slot=$slot" >> $env:GITHUB_OUTPUT

      # 주의: 이전 Stage 1 실행이 만든 D:/Dotory/Cardnews/output/<날짜>/ 데이터가 이
      # 러너에 남아있어야 한다. GitHub-hosted 러너는 매 job마다 새 VM이라 상태가
      # 유지되지 않으므로, actions/cache로 오늘자 산출물 폴더를 복원한다.
      - name: 오늘자 산출물 복원 (Stage 1 캐시)
        uses: actions/cache/restore@v4
        with:
          path: D:/Dotory/Cardnews/output
          key: dotory-output-${{ github.run_id }}-nokey  # 아래 restore-keys로 최신 일치 항목을 사용
          restore-keys: |
            dotory-output-

      - name: 카드 5장 생성 (main.py --dry-run 재사용 — 배포/업로드 없음)
        shell: pwsh
        run: |
          python -X utf8 main.py --slot ${{ steps.slot.outputs.slot }} --dry-run

      - name: 산출물 캐시 저장 (Stage 3에서 이어받기 위함)
        uses: actions/cache/save@v4
        with:
          path: D:/Dotory/Cardnews/output
          key: dotory-output-${{ github.run_id }}

      - name: 텔레그램 카드 승인 요청 전송
        shell: pwsh
        run: |
          python cloud/telegram_gate.py send-cards --slot ${{ steps.slot.outputs.slot }}
