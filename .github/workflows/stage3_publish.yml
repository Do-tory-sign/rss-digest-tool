name: "Stage 3 - 실제 배포 (사이트+인스타+블로그)"

on:
  repository_dispatch:
    types: [cards_approved]
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯 (테스트/수동 실행용)"
        required: true
        type: choice
        options: [morning, lunch, evening, night]

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  publish:
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
      NAVER_COOKIES_JSON: ${{ secrets.NAVER_COOKIES_JSON }}
      NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js (firebase-tools 용)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: firebase-tools 설치
        run: npm install -g firebase-tools

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: 슬롯 결정
        id: slot
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "repository_dispatch") {
            $slot = python cloud/dispatch_payload.py slot
          } else {
            $slot = "${{ inputs.slot }}"
          }
          echo "slot=$slot" >> $env:GITHUB_OUTPUT

      - name: Stage 2가 만든 승인된 카드 이미지 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 슬롯 정시(:55 KST)까지 대기 (미리 승인해둬도 정시에 발행되게)
        shell: pwsh
        run: |
          # 2026-07-06: 카드 승인 즉시 발행하면, 사용자가 외출 전에 미리 승인해둔 경우
          # 실제 슬롯 시각(예: 밤 10시)이 아니라 승인한 시점에 바로 게시돼버림 — 로컬
          # review.py가 하던 것처럼 슬롯:55까지 대기했다가 발행하도록 클라우드에도 동일하게 적용.
          # 반드시 캐시 복원 "다음"에 대기해야 함 — 대기가 먼저면, 대기하는 몇 시간 동안
          # 다른 실행들이 캐시를 계속 새로 저장해서 restore-keys 접두어 매칭이 엉뚱한(더 최신)
          # 캐시를 가리키게 되고, 깨어난 뒤 복원하면 지금 승인한 데이터가 아닌 다른 데이터가
          # 온다(실제로 이 버그로 밤 슬롯 발행이 통째로 실패한 적 있음, 07-06). 캐시를 먼저
          # 복원해서 D: 드라이브에 파일을 내려받아두면, 대기 중 다른 실행이 캐시를 덮어써도
          # 이미 이 러너 로컬에 파일이 있으니 영향 없음.
          $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
          $hourMap = @{ morning = 6; lunch = 11; evening = 16; night = 21 }
          $slot = "${{ steps.slot.outputs.slot }}"
          $nowKst = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $kst)
          $target = Get-Date -Year $nowKst.Year -Month $nowKst.Month -Day $nowKst.Day -Hour $hourMap[$slot] -Minute 55 -Second 0
          $waitSec = ($target - $nowKst).TotalSeconds
          if ($waitSec -gt 0) {
            Write-Host "[wait] $slot 목표 시각(KST $($target.ToString('HH:mm')))까지 ${waitSec}초 대기"
            Start-Sleep -Seconds $waitSec
          } else {
            Write-Host "[wait] 이미 목표 시각 지남 — 즉시 발행"
          }

      - name: instagram_graph_token.json 복원 (Secret -> 파일)
        shell: pwsh
        run: |
          Set-Content -Path "instagram_graph_token.json" -Value '${{ secrets.INSTAGRAM_GRAPH_TOKEN_JSON }}' -Encoding utf8NoBOM

      - name: Firebase 서비스 계정 인증
        shell: pwsh
        run: |
          Set-Content -Path "firebase_service_account.json" -Value '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' -Encoding utf8NoBOM
          echo "GOOGLE_APPLICATION_CREDENTIALS=$pwd/firebase_service_account.json" >> $env:GITHUB_ENV

      - name: 네이버 로그인 복원 (쿠키 주입 — 2026-07-06 실험적 도입)
        shell: pwsh
        run: |
          python -X utf8 cloud/naver_cookie_login.py
        continue-on-error: true  # 실패해도(IP 이상탐지 등) main.py가 블로그만 실패 처리하고 사이트+인스타는 정상 진행되게 함

      - name: 실제 배포 (main.py --publish-only 그대로 재사용 — 사이트+인스타+블로그)
        shell: pwsh
        run: |
          python -X utf8 main.py --slot ${{ steps.slot.outputs.slot }} --publish-only

      - name: 승인된 카드 이미지 업로드 (블로그는 로컬에서 처리 — 다운로드용)
        uses: actions/upload-artifact@v4
        with:
          name: approved-cards-${{ steps.slot.outputs.slot }}
          # 2026-07-06: 블로그는 조립된 카드(cover/fact/... 최종 PNG, D:/output에 있음)만 있으면
          # 되고 원본 일러스트(web/v2/img)는 필요 없음 — 게다가 서로 다른 드라이브(D:\ vs
          # 체크아웃 폴더)를 같이 넣으면 upload-artifact가 공통 상위 경로를 못 찾아 에러남.
          path: D:/Dotory/Cardnews/output
          retention-days: 2

      - name: 민감 파일 정리
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue instagram_graph_token.json
          Remove-Item -Force -ErrorAction SilentlyContinue firebase_service_account.json
