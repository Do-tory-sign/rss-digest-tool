name: "제미니 API 예산 알림 확인 (Pub/Sub -> 텔레그램)"

on:
  schedule:
    - cron: "*/30 * * * *"  # 30분마다 확인
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
      GEMINI_BUDGET_RELAY_SA_JSON: ${{ secrets.GEMINI_BUDGET_RELAY_SA_JSON }}
      # 2026-07-17: 선불(prepay)/후불(postpay)에 따라 예산 초과 시 실제로 서비스가
      # 멈추는지가 다름 — 계정을 바꿀 때 이 값만 바꾸면 알림 문구가 같이 바뀌게 설정으로
      # 뺐다(하드코딩하면 나중에 다시 선불로 돌아갔을 때 "괜찮다"고 잘못 안내하게 됨).
      # 값: "postpay"(기본) 또는 "prepay"
      GEMINI_BILLING_MODE: "postpay"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-cloud-pubsub requests python-dotenv tzdata

      - name: 오늘자 KST 날짜 계산
        id: kst
        run: echo "date=$(TZ=Asia/Seoul date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # 2026-07-08: GCP 예산 알림이 하루에 몇십 번씩 반복 발행돼서 매번 텔레그램으로
      # 보내면 새벽 내내 알림 폭탄이 됨 — 오늘 하루 한 번 보냈는지 표시를 캐시에 남겨서
      # check_gemini_budget_alert.py가 그 이후엔 조용히 ack만 하고 넘어가게 한다.
      - name: 오늘 이미 보냈는지 확인
        uses: actions/cache/restore@v4
        with:
          path: cloud/.gemini_budget_alert_sent_today
          key: gemini-budget-alert-sent-${{ steps.kst.outputs.date }}

      - run: python cloud/check_gemini_budget_alert.py

      - name: 오늘 전송 여부 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cloud/.gemini_budget_alert_sent_today
          key: gemini-budget-alert-sent-${{ steps.kst.outputs.date }}
