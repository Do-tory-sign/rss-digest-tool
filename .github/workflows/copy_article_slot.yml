name: "기사 슬롯 복사 (다른 시간대로 재사용, 수동 실행 전용)"

on:
  workflow_dispatch:
    inputs:
      from_slot:
        description: "원본 슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]
      to_slot:
        description: "복사할 슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  copy-slot:
    runs-on: windows-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: 산출물 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 슬롯 복사 + 승인 메시지 재전송
        shell: pwsh
        run: |
          python cloud/copy_article_slot.py --from ${{ inputs.from_slot }} --to ${{ inputs.to_slot }}

      # 2026-07-07: 이 워크플로우는 stage1_collect.yml의 정식 수집 과정을 안 거치기 때문에
      # "오늘 이 슬롯 이미 수집했음" 중복 방지 표시가 안 남아서, 나중에 그 슬롯의 진짜 cron이
      # 늦게 도착하면 또 새 기사를 만들어버리는 문제가 있었음 — 여기서도 같은 표시를 남긴다.
      - name: 오늘자 KST 날짜 계산
        id: kst
        shell: pwsh
        run: |
          $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
          $nowKst = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $kst)
          # 2026-07-17: stage1_collect.yml에 있는 야식 자정 넘김 dedup 날짜 롤백 로직이
          # 이 워크플로우엔 없어서, 이 워크플로우로 자정 이후~정오 이전에 night로 복사하면
          # dedup 캐시가 dotory-collected-<다음날짜>-night로 잘못 저장되는 동일한 사고가
          # 재발할 수 있음(코드 리뷰로 발견) — stage1_collect.yml과 동일한 규칙 적용.
          $date = $nowKst.ToString('yyyyMMdd')
          if ("${{ inputs.to_slot }}" -eq "night" -and $nowKst.Hour -lt 12) {
            $date = $nowKst.AddDays(-1).ToString('yyyyMMdd')
          }
          echo "date=$date" >> $env:GITHUB_OUTPUT

      - name: 중복 실행 방지 표시 저장
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path cloud/.dedup_marker | Out-Null

      - name: 중복 실행 방지 캐시 저장
        uses: actions/cache/save@v4
        with:
          path: cloud/.dedup_marker
          key: dotory-collected-${{ steps.kst.outputs.date }}-${{ inputs.to_slot }}

      - name: 갱신된 산출물 재저장
        uses: actions/cache/save@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-${{ github.run_id }}
