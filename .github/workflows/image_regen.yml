name: "메인 그림 재생성 (기사 내용 유지)"

on:
  repository_dispatch:
    types: [image_regen]
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯"
        required: true
        type: choice
        options: [morning, lunch, evening, night]
      feedback:
        description: "그림에 반영할 피드백"
        required: false
        type: string

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  regen-image:
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium

      - name: D 드라이브 출력 폴더 준비
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: Stage 2 산출물 복원
        uses: actions/cache/restore@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-nokey
          restore-keys: |
            dotory-output-

      - name: 슬롯/피드백 추출
        id: p
        shell: pwsh
        # 2026-07-17 보안 수정: article_image_regen.yml과 동일한 이유로, 텔레그램 답장
        # 텍스트를 run: 스크립트 본문에 직접 치환하지 않고 env: 매핑을 거쳐 전달한다
        # (PowerShell 인젝션 방지 — 이 잡도 GEMINI_API_KEY 등 시크릿을 env로 가짐).
        env:
          IN_SLOT: ${{ inputs.slot }}
          IN_FEEDBACK: ${{ inputs.feedback }}
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $slot = $env:IN_SLOT
            $feedback = $env:IN_FEEDBACK
          } else {
            $slot = python cloud/dispatch_payload.py slot
            $feedback = python cloud/dispatch_payload.py feedback
          }
          echo "slot=$slot" >> $env:GITHUB_OUTPUT
          # 멀티라인 피드백이 GITHUB_OUTPUT 파싱을 깨지 않도록 안전 구분자 문법 사용
          echo "feedback<<GHOUTPUT_FEEDBACK_EOF" >> $env:GITHUB_OUTPUT
          echo "$feedback" >> $env:GITHUB_OUTPUT
          echo "GHOUTPUT_FEEDBACK_EOF" >> $env:GITHUB_OUTPUT

      - name: 메인 그림 재생성 + 카드 전체 재조립 + 재전송
        shell: pwsh
        env:
          SLOT: ${{ steps.p.outputs.slot }}
          FEEDBACK: ${{ steps.p.outputs.feedback }}
        run: |
          python cloud/regen_image_and_notify.py --slot $env:SLOT --feedback "$env:FEEDBACK"

      - name: 갱신된 산출물 재저장
        uses: actions/cache/save@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-${{ github.run_id }}
