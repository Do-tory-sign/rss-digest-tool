name: "Stage 1 - 뉴스 수집 + 기사 승인 요청"

# 하루 4슬롯(발행 목표 아침06/점심11/저녁16/야식21시:55, 한국시간=UTC+9) — 발행
# 시각보다 미리 기사를 수집/선택해 중복 감지 재선택·이미지 재생성 버퍼를 확보한다.
# 발행 게이팅(stage3의 :55 대기)은 그대로 유지되므로 실제 발행 시각 자체는 안 바뀜,
# 수집이 더 일찍 시작될 뿐 — 승인 없이는 발행 안 되므로 늦게 확인해도 유실은 없음.
# 아침만 예외: 사용자가 새벽 5시엔 못 일어나서(2026-07-15) 자정 무렵(01:00 KST)으로
# 당김 — 발행(06:55)까지 버퍼도 충분하고, 취침 전(~02:00)에 승인 확인 가능한 시간대.
# cron은 UTC 기준이므로 9시간을 빼서 등록한다: 01,10,15,20 KST -> 16(전날),01,06,11 UTC
on:
  schedule:
    - cron: "0 16 * * *"  # 01:00 KST (전날 16:00 UTC) -> morning (06:55 발행 목표)
    - cron: "0 1 * * *"   # 10:00 KST -> lunch (11:55 발행 목표)
    - cron: "0 6 * * *"   # 15:00 KST -> evening (16:55 발행 목표)
    - cron: "0 11 * * *"  # 20:00 KST -> night (21:55 발행 목표)
  workflow_dispatch:
    inputs:
      slot:
        description: "슬롯 (morning/lunch/evening/night) — 수동 실행 시 지정"
        required: true
        type: choice
        options: [morning, lunch, evening, night]
  repository_dispatch:
    types: [article_regen, cron_trigger]   # article_regen: 재생성 버튼 클릭
    # cron_trigger: 외부 정시 스케줄러(cron-job.org)가 GitHub 자체 schedule의 지연 문제를
    # 피하려고 정확한 시각에 직접 호출하는 트리거 (2026-07-08 도입)

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  determine-slot:
    runs-on: windows-latest
    outputs:
      slot: ${{ steps.pick.outputs.slot }}
    steps:
      - id: pick
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $slot = "${{ inputs.slot }}"
          } elseif ("${{ github.event_name }}" -eq "repository_dispatch") {
            $slot = "${{ github.event.client_payload.slot }}"
          } else {
            # 2026-07-06: 예전엔 "실행 시작 시각의 UTC hour"로 역산했는데, GitHub Actions
            # cron은 정시보다 늦게(가끔은 다음 정시에 더 가깝게 이르게) 도는 경우가 흔해서,
            # 실제 실행 시각이 목표 hour와 안 맞아 default(morning)로 잘못 떨어지는 버그가
            # 있었음(07-06 저녁 cron이 06:39 UTC에 시작 -> hour=6이라 미스매치 -> morning으로
            # 잘못 실행됨). github.event.schedule은 실행 시각과 무관하게 "어떤 cron
            # 표현식이 이 실행을 매칭시켰는지"를 그대로 알려주므로 이걸 직접 매칭한다.
            # 2026-07-06 후속 버그: cron 필드 사이 공백이 YAML에서 정렬용으로 2칸인 것도
            # 있어서("0 2  * * *") 문자열을 그대로 비교하면 미스매치가 남 — 공백을 1칸으로
            # 정규화한 뒤 비교한다(이 버그로 저녁/점심 cron이 또 morning으로 잘못 떨어졌었음).
            $sched = ("${{ github.event.schedule }}" -replace '\s+', ' ').Trim()
            switch ($sched) {
              "0 16 * * *" { $slot = "morning" }
              "0 1 * * *"  { $slot = "lunch" }
              "0 6 * * *"  { $slot = "evening" }
              "0 11 * * *" { $slot = "night" }
              default { $slot = "morning" }
            }
          }
          echo "slot=$slot" >> $env:GITHUB_OUTPUT

  collect:
    needs: determine-slot
    runs-on: windows-latest
    env:
      SLOT: ${{ needs.determine-slot.outputs.slot }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BRAND_NAME: ${{ secrets.BRAND_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치 (기사 스크레이핑/이미지 렌더링용)
        run: playwright install --with-deps chromium

      - name: D 드라이브 출력 폴더 준비 (config.py의 하드코딩된 OUTPUT_DIR과 동일 경로)
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "D:/Dotory/Cardnews/output" | Out-Null

      - name: 오늘자 KST 날짜 계산 (중복 실행 방지 키용)
        id: kst
        shell: pwsh
        run: |
          $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
          $nowKst = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $kst)
          # 2026-07-10: GitHub 장애 등으로 night(21시) 슬롯이 자정을 넘겨 지연 실행되면(예: 00:17
          # KST), 그 시점의 "오늘 날짜"는 이미 다음 날짜라서 dedup 캐시가 "다음 날 야식은 이미
          # 수집됨"으로 잘못 저장돼, 그날 진짜 21시 야식 트리거가 조용히 스킵되는 사고가 있었음
          # (텔레그램이 아예 안 옴). night 슬롯이 자정 이후 이른 시간(정오 이전)에 도는 경우는
          # 항상 "전날 밤의 지연 실행"이므로, 이때만 날짜를 하루 되돌려서 캐시 키가 실제 대상
          # 날짜(전날)를 가리키게 한다.
          $date = $nowKst.ToString('yyyyMMdd')
          if ("$env:SLOT" -eq "night" -and $nowKst.Hour -lt 12) {
            $date = $nowKst.AddDays(-1).ToString('yyyyMMdd')
          }
          echo "date=$date" >> $env:GITHUB_OUTPUT

      - name: 오늘 이 슬롯 이미 수집됐는지 확인 (cron 중복 실행 방지)
        id: dedup
        uses: actions/cache/restore@v4
        with:
          path: cloud/.dedup_marker
          key: dotory-collected-${{ steps.kst.outputs.date }}-${{ env.SLOT }}

      # 2026-07-07: 사용자가 수동으로 슬롯을 미리 트리거해서 이미 승인까지 끝냈는데, 그 슬롯의
      # 실제 cron이 몇 시간 늦게 도착해서 같은 슬롯 기사가 하루에 두 번 만들어지는 문제가 있었음
      # — schedule(자동) 트리거일 때만, 오늘 이 슬롯이 이미 한 번 수집된 적 있으면 건너뛴다.
      # workflow_dispatch(수동)나 article_regen(재생성 버튼)은 사용자가 의도한 재실행이므로
      # 그대로 진행시킨다.
      - name: 재생성 피드백 추출 (article_regen 이벤트일 때만)
        id: feedback
        if: github.event.action == 'article_regen'
        shell: pwsh
        run: |
          $extra = python cloud/dispatch_payload.py extra
          echo "category=$extra" >> $env:GITHUB_OUTPUT

      - name: 뉴스 수집 + 큐레이션 + 이미지 생성 (v2_main.py 그대로 재사용)
        if: ${{ !(github.event_name == 'schedule' || github.event.action == 'cron_trigger') || steps.dedup.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          python -X utf8 v2_main.py --slot $env:SLOT --fresh

      # 2026-07-08: 경쟁 상태 버그 발견 — 예전엔 "산출물 캐시 저장"이 맨 마지막 스텝이라,
      # 텔레그램 메시지를 보낸 직후 사용자가 아주 빨리 승인을 누르면 stage2가 이 캐시가
      # 저장되기도 전에 시작돼서 더 오래된(엉뚱한) 캐시를 가져오는 바람에 "데이터 없음"으로
      # 실패했음(실제로 저녁 슬롯에서 발생, 승인까지 5분 이내). 캐시 저장을 텔레그램 전송
      # "앞"으로 옮겨서, 사용자가 메시지를 보기도 전에 이미 캐시가 저장돼 있도록 순서를 바꿈.
      - name: 산출물 캐시 저장 (Stage 2에서 이어받기 위함 — 반드시 텔레그램 전송보다 먼저)
        if: ${{ !(github.event_name == 'schedule' || github.event.action == 'cron_trigger') || steps.dedup.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            D:/Dotory/Cardnews/output
            web/v2/img
          key: dotory-output-${{ github.run_id }}

      - name: 텔레그램 기사 승인 요청 전송
        if: ${{ !(github.event_name == 'schedule' || github.event.action == 'cron_trigger') || steps.dedup.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          python cloud/telegram_gate.py send-article --slot $env:SLOT

      - name: 중복 실행 방지 표시 저장
        if: ${{ !(github.event_name == 'schedule' || github.event.action == 'cron_trigger') || steps.dedup.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path cloud/.dedup_marker | Out-Null

      - name: 중복 실행 방지 캐시 저장
        if: steps.dedup.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: cloud/.dedup_marker
          key: dotory-collected-${{ steps.kst.outputs.date }}-${{ env.SLOT }}

  # 2026-07-09: GitHub Actions 자체 인프라 장애("The job was not acquired by Runner")로
  # determine-slot이 실패하는 사고가 있었음(자동 트리거는 재시도 없이 그냥 조용히 실패했음).
  # 자동(schedule/cron_trigger) 트리거가 실패하면 사용자에게 즉시 알리고 3분 뒤 한 번 자동
  # 재시도한다. 재시도 자체가 또 실패하면(client_payload.is_retry=true였는데도 또 실패)
  # 무한 루프 방지를 위해 재시도하지 않고 최종 실패 알림만 보낸다. windows-latest보다
  # 경쟁이 덜한 ubuntu-latest를 써서 이 알림/재시도 잡 자체가 러너 부족으로 막힐 확률을 낮춘다.
  notify-and-retry-on-failure:
    needs: determine-slot
    if: failure() && (github.event_name == 'schedule' || github.event.action == 'cron_trigger')
    runs-on: ubuntu-latest
    steps:
      - name: 슬롯 재계산 (determine-slot 실패로 output이 없음)
        id: slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            slot="${{ github.event.client_payload.slot }}"
          else
            sched="$(echo '${{ github.event.schedule }}' | tr -s ' ')"
            case "$sched" in
              "0 21 * * *") slot="morning" ;;
              "0 2 * * *")  slot="lunch" ;;
              "0 7 * * *")  slot="evening" ;;
              "0 12 * * *") slot="night" ;;
              *) slot="morning" ;;
            esac
          fi
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: 이미 재시도한 실행인지 확인 (무한 루프 방지)
        id: retry_check
        shell: bash
        run: echo "is_retry=${{ github.event.client_payload.is_retry == true }}" >> "$GITHUB_OUTPUT"

      - name: 텔레그램 실패+재시도 예고 알림
        if: steps.retry_check.outputs.is_retry != 'true'
        shell: bash
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ ${{ steps.slot.outputs.slot }} 슬롯 트리거 실패(GitHub 러너 배정 문제로 추정) — 3분 뒤 자동으로 한 번 더 시도할게요."

      - name: 3분 대기 후 재시도
        if: steps.retry_check.outputs.is_retry != 'true'
        shell: bash
        run: sleep 180

      - name: 재트리거 dispatch
        if: steps.retry_check.outputs.is_retry != 'true'
        shell: bash
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT_FOR_SECRETS }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d "{\"event_type\":\"cron_trigger\",\"client_payload\":{\"slot\":\"${{ steps.slot.outputs.slot }}\",\"is_retry\":true}}"

      - name: 재시도도 실패한 경우 최종 알림
        if: steps.retry_check.outputs.is_retry == 'true'
        shell: bash
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚨 ${{ steps.slot.outputs.slot }} 슬롯: 재시도도 실패했어요. GitHub Actions 상태를 확인하고 수동으로 재시도해주세요."
