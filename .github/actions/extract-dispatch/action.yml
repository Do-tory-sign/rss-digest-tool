# workflow_dispatch(수동 실행) 또는 repository_dispatch(텔레그램 버튼/자동 트리거)로 들어온
# 슬롯과 부가값(피드백/카드명 등)을 하나로 통일해서 꺼낸다.
#
# 2026-07-17: stage1_collect.yml을 뺀 5개 워크플로우가 이 "슬롯 결정" 로직을 각자 복붙해서
# 갖고 있었음 — 코드 리뷰에서 이 중복이 실제 버그(피드백 텍스트가 한 워크플로우에서만
# 반영됨)의 원인이 됐던 걸 발견하고 공용 액션으로 뽑아냄.
#
# 주의: 피드백처럼 사용자가 자유롭게 쓴 텍스트는 절대 이 액션 바깥의 run 스크립트
# 본문에 직접 치환하지 말 것 — 반드시 이 액션의 outputs를 env 매핑으로 받아서 사용할 것
# (PowerShell 인젝션 방지).
name: "슬롯/부가값 추출"
description: "workflow_dispatch 또는 repository_dispatch에서 슬롯/부가값을 통일해서 꺼낸다"

inputs:
  manual_slot:
    description: "workflow_dispatch일 때 inputs.slot 값을 그대로 전달"
    required: false
    default: ""
  manual_extra:
    description: "workflow_dispatch일 때 inputs.feedback 등 부가값을 그대로 전달"
    required: false
    default: ""
  extra_key:
    description: "repository_dispatch일 때 client_payload에서 꺼낼 부가값 키 이름 (feedback/extra/card 등)"
    required: false
    default: "extra"

outputs:
  slot:
    description: "morning/lunch/evening/night"
    value: ${{ steps.extract.outputs.slot }}
  extra:
    description: "부가값(피드백 텍스트, 카드명 등) — 여러 줄일 수 있음"
    value: ${{ steps.extract.outputs.extra }}

runs:
  using: "composite"
  steps:
    - id: extract
      shell: pwsh
      env:
        IS_WORKFLOW_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        MANUAL_SLOT: ${{ inputs.manual_slot }}
        MANUAL_EXTRA: ${{ inputs.manual_extra }}
        EXTRA_KEY: ${{ inputs.extra_key }}
      run: |
        if ($env:IS_WORKFLOW_DISPATCH -eq "true") {
          $slot = $env:MANUAL_SLOT
          $extra = $env:MANUAL_EXTRA
        } else {
          $slot = python cloud/dispatch_payload.py slot
          $extra = python cloud/dispatch_payload.py $env:EXTRA_KEY
        }
        echo "slot=$slot" >> $env:GITHUB_OUTPUT
        # extra는 피드백처럼 여러 줄일 수 있어서 안전 구분자 문법을 사용한다
        # (한 줄 "key=value" 형식으로 쓰면 줄바꿈에서 GITHUB_OUTPUT 파싱이 깨짐).
        echo "extra<<GHOUTPUT_EXTRACT_EOF" >> $env:GITHUB_OUTPUT
        echo "$extra" >> $env:GITHUB_OUTPUT
        echo "GHOUTPUT_EXTRACT_EOF" >> $env:GITHUB_OUTPUT
