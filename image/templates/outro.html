<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  font-family: 'Nunito', 'Noto Sans KR', sans-serif;
  overflow: hidden;
  background: #FEFAF0;
}
.bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 90% 10%, #FFE4B0 0%, transparent 55%),
    radial-gradient(ellipse at 10% 90%, #FFD580 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #FFF8DC 0%, #FEFAF0 100%);
}
.deco-circle { position: absolute; border-radius: 50%; }
.dc1 { width:400px; height:400px; background:#F59E0B; opacity:0.08; top:-120px; right:-80px; }
.dc2 { width:300px; height:300px; background:#D97706; opacity:0.07; bottom:-80px; left:-60px; }
.dc3 { width:200px; height:200px; background:#B45309; opacity:0.06; top:300px; right:50px; }
.top-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: linear-gradient(90deg, #F59E0B, #D97706, #B45309, #D97706, #F59E0B);
}
.bottom-stripe {
  position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
  background: linear-gradient(90deg, #F59E0B, #D97706, #B45309, #D97706, #F59E0B);
}
.card {
  position: relative; z-index: 10;
  width: 1080px; height: 1080px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  padding: 80px;
}
.acorn-wrap {
  width: 260px; height: 260px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 8px 40px rgba(180,83,9,0.15), 0 2px 8px rgba(180,83,9,0.1);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  border: 3px solid #FDE68A;
  margin-bottom: 40px;
}
.acorn-wrap img { width: 232px; height: 232px; object-fit: contain; }

.brand {
  font-family: 'Nunito', sans-serif;
  font-size: 72px; font-weight: 900;
  line-height: 1; letter-spacing: -0.01em;
  margin-bottom: 28px;
}
.brand .do   { color: #78350F; }
.brand .apos { color: #B45309; font-size: 0.65em; }
.brand .tory { color: #D97706; }
.brand .news {
  color: #92400E; font-size: 0.38em; font-weight: 700;
  letter-spacing: 0.25em; vertical-align: middle;
  margin-left: 10px;
}

.tagline {
  font-size: 30px; font-weight: 400;
  color: #78350F; text-align: center;
  line-height: 1.6; margin-bottom: 52px;
  letter-spacing: -0.01em;
}
.tagline strong { font-weight: 700; color: #B45309; }

.follow-box {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
}
.follow-label {
  font-size: 22px; font-weight: 400;
  color: #92400E; opacity: 0.7;
  letter-spacing: 0.05em;
}
.follow-handle {
  font-family: 'Nunito', sans-serif;
  font-size: 38px; font-weight: 900;
  color: #B45309;
  background: rgba(180,83,9,0.08);
  border: 2px solid rgba(180,83,9,0.2);
  border-radius: 100px;
  padding: 14px 44px;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="deco-circle dc1"></div>
<div class="deco-circle dc2"></div>
<div class="deco-circle dc3"></div>
<div class="top-stripe"></div>

<div class="card">
  <div class="acorn-wrap"><img src="{{ acorn_path }}" alt="DO's TORY NEWS"></div>

  <div class="brand">
    <span class="do">DO</span><span class="apos">'s</span>
    <span class="tory"> TORY</span><span class="news"> NEWS</span>
  </div>

  <div class="tagline">
    오늘 꼭 알아야 할 뉴스를<br>
    <strong>하루 네 번,</strong><br>
    <strong>쉽고 빠르게</strong> 정리해드립니다.
  </div>

  <div class="follow-box">
    <div class="follow-handle">@do.tory_news</div>
  </div>
</div>

<div class="bottom-stripe"></div>
</body>
</html>
