<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@300;400;700;900&family=Jua&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px;
  font-family: 'Nunito', 'Noto Sans KR', sans-serif;
  overflow: hidden;
  background: #1a0f00;
}

/* 풀블리드 배경 이미지 */
.bg-image {
  position: absolute; inset: 0;
  background-image: url('{{ image_src }}');
  background-size: cover;
  background-position: center 30%;
}

/* 어두운 그라디언트 오버레이 — 상단(프로필 영역 가독성) + 하단 모두 강조 */
.overlay-top {
  position: absolute; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(10, 5, 0, 0.80) 0%,
    rgba(10, 5, 0, 0.35) 16%,
    rgba(10, 5, 0, 0.10) 32%,
    rgba(10, 5, 0, 0.10) 55%,
    rgba(10, 5, 0, 0.70) 78%,
    rgba(10, 5, 0, 0.92) 100%
  );
}

.card {
  position: relative; z-index: 10;
  width: 1080px; height: 1920px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 64px 56px 96px;
}

/* 상단: CTA — 인스타 프로필 아이콘이 좌측 상단에 있으므로 왼쪽 정렬 */
.cta-wrap {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 10px; padding-top: 120px; padding-left: 28px;
}
.cta-arrow {
  font-size: 40px; line-height: 1;
  color: #FFFFFF;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  margin-left: 24px;
}
.cta-pill {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.16);
  border: 1.5px solid rgba(255,255,255,0.35);
  backdrop-filter: blur(6px);
  border-radius: 100px;
  padding: 16px 24px 16px 28px;
  font-family: 'Jua', 'Noto Sans KR', sans-serif;
  font-size: 30px; font-weight: 400;
  color: #FFFFFF;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.cta-pill img {
  width: 30px; height: 30px; object-fit: contain;
  flex-shrink: 0;
}

/* 하단: 브랜드 + 날짜 */
.bottom-section {
  display: flex; flex-direction: column; align-items: center;
  gap: 14px; text-align: center;
}
.brand {
  display: flex; align-items: center; gap: 14px;
}
.brand img {
  width: 64px; height: 64px; object-fit: contain;
  border-radius: 50%; background: rgba(255,255,255,0.15);
  padding: 7px;
}
.brand-text {
  font-family: 'Nunito', sans-serif;
  font-size: 34px; font-weight: 900;
  letter-spacing: -0.01em;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
.brand-text .do   { color: #FDE68A; }
.brand-text .apos { color: #FCD34D; }
.brand-text .tory { color: #FDE68A; }
.brand-text .news {
  color: #FEF3C7; font-weight: 700; font-size: 0.62em;
  letter-spacing: 0.12em; margin-left: 8px;
}
.date-badge {
  font-size: 24px; font-weight: 400;
  color: rgba(255,255,255,0.75);
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="overlay-top"></div>

<div class="card">
  <div class="cta-wrap">
    <div class="cta-arrow">↑</div>
    <div class="cta-pill">오늘의 뉴스, 프로필에서 확인하세요 <img src="{{ acorn_path }}" alt=""></div>
  </div>

  <div class="bottom-section">
    <div class="brand">
      <img src="{{ acorn_path }}" alt="">
      <span class="brand-text">
        <span class="do">DO</span><span class="apos">'s</span>
        <span class="tory"> TORY</span><span class="news"> NEWS</span>
      </span>
    </div>
    <div class="date-badge">{{ date_badge }}</div>
  </div>
</div>
</body>
</html>
