<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  font-family: 'Segoe UI Emoji', 'Nunito', 'Noto Sans KR', sans-serif;
  overflow: hidden;
  position: relative;
  background-image: url('{{ image_src }}');
  background-size: cover;
  background-position: center;
}
.overlay {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 62%;
  background: linear-gradient(to bottom, rgba(59,46,34,0) 0%, rgba(59,46,34,0.72) 30%, rgba(59,46,34,0.92) 100%);
}
.top-overlay {
  position: absolute; left: 0; right: 0; top: 0;
  height: 180px;
  background: linear-gradient(to bottom, rgba(30,22,15,0.55) 0%, rgba(30,22,15,0) 100%);
}
.top-bar {
  position: absolute; top: 48px; left: 56px; right: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  display: flex; align-items: center; gap: 14px;
}
.brand img {
  width: 56px; height: 56px; border-radius: 50%; object-fit: contain;
  background: rgba(30,22,15,0.55);
  padding: 4px;
}
.brand .word {
  font-family: 'Nunito', sans-serif;
  font-size: 32px; font-weight: 900; color: #FFF7E8; letter-spacing: 0.01em;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35);
}
.brand .news {
  font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 700; color: #F2D9B8; letter-spacing: 0.3em;
  margin-left: 6px;
}
.date-top {
  font-family: 'Nunito', sans-serif;
  font-size: 26px; font-weight: 700; color: #F2D9B8;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35);
}
.issue-label {
  position: absolute; left: 64px; bottom: 462px;
  font-family: 'Nunito', sans-serif;
  font-size: 24px; font-weight: 800; color: #F5B942;
  letter-spacing: 0.25em;
}
.slot-title {
  position: absolute; left: 64px; right: 64px; bottom: 388px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 52px; font-weight: 900; color: #FFFFFF;
  line-height: 1.2; word-break: keep-all;
  text-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.date-main {
  position: absolute; left: 64px; bottom: 340px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 26px; font-weight: 700; color: #E8D5B8;
}
.divider {
  position: absolute; left: 64px; bottom: 310px;
  width: 90px; height: 6px; border-radius: 3px;
  background: #F5B942;
}
.headline {
  position: absolute; left: 64px; right: 64px; bottom: 210px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 54px; font-weight: 900; color: #FFFFFF;
  line-height: 1.3; word-break: keep-all;
  text-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.tagline {
  position: absolute; left: 64px; bottom: 128px;
  font-family: 'Segoe UI Emoji', 'Noto Sans KR', sans-serif;
  font-size: 28px; font-weight: 700; color: #F2D9B8;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const h = document.querySelector('.headline');
  const len = h.textContent.trim().length;
  if (len > 18) h.style.fontSize = '46px';
  if (len > 26) h.style.fontSize = '38px';
});
</script>
</head>
<body>
<div class="overlay"></div>
<div class="top-overlay"></div>
<div class="top-bar">
  <div class="brand">
    {% if brand_icon_path %}<img src="{{ brand_icon_path }}" alt="">{% endif %}
    <span class="word">DO's TORY</span><span class="news">NEWS</span>
  </div>
  <div class="date-top">{{ date_badge }}</div>
</div>
<div class="issue-label">TODAY'S ISSUE</div>
<div class="slot-title">{{ slot_title }}</div>
<div class="date-main">{{ date_main }}</div>
<div class="divider"></div>
<div class="headline">{{ headline }}</div>
<div class="tagline">도토리가 쉽게 풀어드려요 🐿</div>
</body>
</html>
